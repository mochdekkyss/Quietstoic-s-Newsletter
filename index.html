<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Quietstoic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    color: #fff;
    text-align: center;
    padding: 40px 20px;

    background: url('https://69cc2a1a21aad77cf8fddd59.imgix.net/kyss/1001595933.jpg') no-repeat center/cover;

    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(30, 50, 80, 0.6);
    z-index: -1;
}

/* TITLE */
h1 {
    font-size: 28px;
    margin-bottom: 40px;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

/* BUTTON */
.btn {
    display: block;
    width: 90%;
    max-width: 300px;
    margin: 15px auto;
    padding: 15px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
}

/* OUTLINE */
.btn-outline {
    border: 3px solid #d4af37;
    color: #fff;
    backdrop-filter: blur(6px);
}

.btn-outline:hover {
    background: #d4af37;
    color: #2f4a6d;
}

/* MAIN BUTTON */
.btn-main {
    background: rgba(255,255,255,0.9);
    color: #2f4a6d;
    border-radius: 40px;
}

.section {
    margin-top: 40px;
}

/* FOOTER */
.footer {
    margin-top: auto;
    text-align: center;
    padding: 20px 0;
    font-size: 13px;
    opacity: 0.7;
}

.footer .line {
    width: 60%;
    height: 2px;
    margin: 0 auto 10px;
    background: #d4af37;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>Quietstoic's Newsletter</h1>

<a href="about.html" class="btn btn-outline">About Website</a>
<a href="https://mochdekkyss.github.io/secret-blog/"

   rel="noopener noreferrer"
   class="btn btn-outline">
   Blogg Dkkyss
</a>

<div class="section">
    <a href="learn.html" class="btn btn-main">Learn Now!</a>
</div>

<div class="section">
    <a href="#" class="btn btn-outline">Playlist</a>
    <a href="#" class="btn btn-outline">Community</a>
</div>

<footer class="footer">
    <div class="line"></div>
    © copyright - dekky.ss
</footer>

</body>
</html>
