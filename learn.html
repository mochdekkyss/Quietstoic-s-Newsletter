<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Learn - Quietstoic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    color: #fff;
    padding: 30px 20px;

    background: url('https://69cc2a1a21aad77cf8fddd59.imgix.net/kyss/1001595933.jpg') no-repeat center/cover;

    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(30, 50, 80, 0.7);
    z-index: -1;
}

/* BACK */
.back {
    display: inline-block;
    margin-bottom: 20px;
    color: #fff;
    text-decoration: none;
    border: 2px solid #d4af37;
    padding: 8px 15px;
    border-radius: 15px;
}

/* TITLE */
h1 {
    font-size: 28px;
    margin-bottom: 30px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* COLUMN */
.col {
    text-align: center;
}

/* SUBTITLE */
.subtitle {
    font-weight: 800;
    margin-bottom: 10px;
}

/* CARD BUTTON */
.card-btn {
    background: #eaeaea;
    color: #000;
    padding: 18px;
    border-radius: 20px;
    margin: 15px 0;
    font-weight: 800;
    text-decoration: none;
    display: block;
    position: relative;
}

/* garis gold bawah */
.card-btn::after {
    content: "";
    position: absolute;
    left: 20%;
    bottom: 10px;
    width: 60%;
    height: 5px;
    background: #d4af37;
    border-radius: 10px;
}

/* hover */
.card-btn:hover {
    transform: scale(1.05);
    transition: 0.2s;
}

/* FOOTER */
.footer {
    margin-top: auto;
    text-align: center;
    padding: 20px 0;
    font-size: 13px;
    opacity: 0.7;
}

.footer .line {
    width: 60%;
    height: 2px;
    margin: 0 auto 10px;
    background: #d4af37;
}
</style>
</head>

<body>

<a href="index.html" class="back">← Back</a>

<h1>Quietstoic's Newsletter</h1>

<div class="grid">

    <!-- US -->
    <div class="col">
        <div class="subtitle">ACCENTS US ↓↓</div>

        <a href="aave.html" class="card-btn">AAVE</a>
        <a href="nyc.html" class="card-btn">NYC</a>
    </div>

    <!-- UK -->
    <div class="col">
        <div class="subtitle">ACCENTS UK ↓↓</div>

        <a href="roadman.html" class="card-btn">ROADMAN</a>
        <a href="london Mle.html" class="card-btn">LONDON MLE</a>
    </div>

</div>

<footer class="footer">
    <div class="line"></div>
    © copyright - dekky.ss
</footer>

</body>
</html>
